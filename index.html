<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Portfolio Under Construction</title>
	<meta name="description" content="Portfolio under construction page.">
	<style>
		:root {
			color-scheme: dark;
			--bg: #0f172a;
			--bg-soft: #1e293b;
			--text: #e2e8f0;
			--muted: #94a3b8;
			--accent: #f59e0b;
			--accent-soft: rgba(245, 158, 11, 0.16);
		}

		* {
			box-sizing: border-box;
		}

		html, body {
			height: 100%;
			margin: 0;
			font-family: Arial, Helvetica, sans-serif;
			background:
				radial-gradient(circle at top, rgba(245, 158, 11, 0.18), transparent 34%),
				linear-gradient(180deg, #111827 0%, #0f172a 100%);
			color: var(--text);
		}

		body {
			display: grid;
			place-items: center;
			padding: 24px;
		}

		main {
			width: min(640px, 100%);
			text-align: center;
			padding: 48px 28px;
			border: 1px solid rgba(148, 163, 184, 0.18);
			border-radius: 28px;
			background: rgba(15, 23, 42, 0.72);
			backdrop-filter: blur(10px);
			box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
		}

		.badge {
			display: inline-flex;
			align-items: center;
			gap: 10px;
			padding: 10px 16px;
			border-radius: 999px;
			background: var(--accent-soft);
			color: #fde68a;
			font-size: 0.92rem;
			letter-spacing: 0.08em;
			text-transform: uppercase;
			font-weight: 700;
		}

		.dot {
			width: 10px;
			height: 10px;
			border-radius: 50%;
			background: var(--accent);
			box-shadow: 0 0 0 6px rgba(245, 158, 11, 0.18);
		}

		h1 {
			margin: 24px 0 16px;
			font-size: clamp(2.4rem, 5vw, 4.4rem);
			line-height: 1.05;
			letter-spacing: -0.04em;
		}

		p {
			margin: 0 auto;
			max-width: 34rem;
			color: var(--muted);
			font-size: 1.05rem;
			line-height: 1.7;
		}

		.status {
			display: inline-flex;
			margin-top: 28px;
			padding: 12px 18px;
			border-radius: 14px;
			background: rgba(30, 41, 59, 0.9);
			border: 1px solid rgba(148, 163, 184, 0.14);
			color: var(--text);
			font-weight: 600;
		}

		.hint {
			margin-top: 18px;
			font-size: 0.95rem;
			color: #cbd5e1;
		}
	</style>
</head>
<body>
	<main>
		<div class="badge"><span class="dot" aria-hidden="true"></span> Portfolio update</div>
		<h1>Portfolio under construction</h1>
		<p>
			This portfolio is currently being built and refined. Check back soon for projects,
			experience, and more details about my work.
		</p>
		<div class="status">Coming soon</div>
		<div class="hint">Thanks for your patience while the site is being prepared.</div>
	</main>
</body>
</html>
